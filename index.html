<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>convert-to-animated-webp</title>
    <!-- Tailwind v4 and Google Fonts Google Sans Code integration -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.11.6/ffmpeg.min.js" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'Google Sans Code', ui-monospace, monospace;
        }
    </style>
</head>

<body
    class="bg-[#0a0a0a] text-gray-300 min-h-screen flex flex-col items-center py-12 px-4 selection:bg-emerald-500 selection:text-black">

    <div class="max-w-3xl w-full flex flex-col gap-6">

        <!-- Header Section -->
        <header class="border-b border-gray-800 pb-6">
            <div class="flex items-center gap-3 mb-1">
                <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <h1 class="text-xl font-bold tracking-tight text-white">convert-to-animated-webp</h1>
            </div>
            <p class="text-xs text-gray-500 uppercase tracking-widest font-mono">Your files never leave your device</p>
        </header>

        <!-- System Notification State -->
        <div id="status"
            class="p-3 bg-[#0f141c] border border-blue-900/40 text-blue-400 font-mono text-xs flex items-center gap-2">
            <span class="text-blue-500">⏳</span> Loading app tools... Please wait.
        </div>

        <!-- Dropzone Layer -->
        <div class="relative">
            <label id="dropzone"
                class="block w-full border border-dashed border-gray-800 bg-[#0d0d0d] hover:bg-[#121212] hover:border-gray-700 transition-colors p-8 text-center cursor-pointer group">
                <input id="file-input" type="file" accept="image/gif,video/mp4" class="hidden" disabled />
                <div class="flex flex-col items-center justify-center space-y-2 pointer-events-none">
                    <p class="text-xs text-gray-400 font-medium group-hover:text-white transition-colors">
                        [ Drag and drop your file here, or click to choose ]
                    </p>
                    <p class="text-[11px] text-gray-600 uppercase tracking-wider">
                        Accepts: .mp4 / .gif (Under 50MB works best)
                    </p>
                </div>
            </label>
            <!-- File Badge Info Overlay -->
            <div id="file-info"
                class="hidden mt-2 p-2 bg-[#0e1713] border border-emerald-900/50 text-emerald-400 font-mono text-[11px] text-center">
            </div>
        </div>

        <!-- Configuration Settings Terminal Interface -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-px bg-gray-800 border border-gray-800">

            <!-- Parameter: Compression -->
            <div class="bg-[#0d0d0d] p-4 flex flex-col justify-between">
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">01 // Image
                        Quality</label>
                    <p class="text-xs text-gray-600 mb-4">Lower quality makes smaller file sizes.</p>
                </div>
                <div class="flex items-center gap-4">
                    <input type="range" id="quality" min="10" max="100" value="75"
                        class="w-full h-1 bg-gray-800 accent-emerald-500 appearance-none cursor-pointer">
                    <span id="quality-val"
                        class="text-xs font-bold text-emerald-400 bg-[#141414] px-2 py-0.5 border border-gray-800">75%</span>
                </div>
            </div>

            <!-- Parameter: Resolution Constraints -->
            <div class="bg-[#0d0d0d] p-4 flex flex-col justify-between">
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">02 // Maximum
                        Width</label>
                    <p class="text-xs text-gray-600 mb-3">Shrinking the image dimensions saves a lot of space.</p>
                </div>
                <select id="max-width"
                    class="w-full bg-[#141414] border border-gray-800 rounded-none p-2 text-xs text-gray-300 font-mono focus:outline-none focus:border-gray-600 cursor-pointer">
                    <option value="original">Original size (No change)</option>
                    <option value="1080">1080px (Large)</option>
                    <option value="720" selected>720px (Standard Web)</option>
                    <option value="480">480px (Mobile size)</option>
                    <option value="320">320px (Small thumbnail)</option>
                </select>
            </div>
        </div>

        <!-- Processing Button Actions -->
        <button id="convert-btn"
            class="w-full py-3 px-4 bg-emerald-500 hover:bg-emerald-400 active:bg-emerald-600 disabled:bg-[#141414] text-black disabled:text-gray-600 font-bold font-mono text-xs uppercase tracking-widest border border-emerald-600 disabled:border-gray-800 cursor-pointer disabled:cursor-not-allowed transition-colors"
            disabled>
            Convert to WebP
        </button>

        <!-- Debug Console Framework Logs -->
        <div id="log-container" class="hidden flex flex-col">
            <div
                class="p-2 bg-[#141414] border-t border-x border-gray-800 text-[10px] font-bold text-gray-500 uppercase tracking-wider">
                Progress Log
            </div>
            <div id="log"
                class="font-mono text-[11px] bg-black p-4 h-32 overflow-y-auto text-gray-400 border border-gray-800 leading-relaxed scrollbar-thin">
            </div>
        </div>

        <!-- Binary Assets Transcoded Outputs Layout -->
        <div id="output-container"
            class="hidden border border-gray-800 bg-[#0d0d0d] p-6 flex flex-col items-center space-y-4">
            <div class="w-full text-left border-b border-gray-800 pb-2 mb-2">
                <span class="text-xs font-bold text-emerald-400 uppercase tracking-wider">// New Image Ready</span>
            </div>

            <img id="output-image"
                class="max-w-full border border-gray-800 shadow-2xl bg-[radial-gradient(#1a1a1a_1px,transparent_1px)] [background-size:16px_16px]"
                src="" alt="Output Preview">

            <div class="w-full flex flex-col items-center space-y-2">
                <a id="download-btn"
                    class="inline-flex items-center gap-2 bg-white hover:bg-gray-200 text-black font-bold font-mono text-xs uppercase tracking-wider py-2 px-6 border border-white transition-colors"
                    href="" download="animated.webp">
                    💾 Download WebP Image
                </a>
                <p id="size-saved" class="text-[11px] text-gray-500 font-mono tracking-wide"></p>
            </div>
        </div>

    </div>

    <!-- Main Controller Logic Interface Core -->
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;

        const ffmpeg = createFFmpeg({
            corePath: 'https://cdnjs.cloudflare.com/ajax/libs/ffmpeg-core/0.11.0/ffmpeg-core.js',
            log: true
        });

        const statusDiv = document.getElementById('status');
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const convertBtn = document.getElementById('convert-btn');
        const qualityInput = document.getElementById('quality');
        const qualityVal = document.getElementById('quality-val');
        const maxWidthSelect = document.getElementById('max-width');
        const logContainer = document.getElementById('log-container');
        const logDiv = document.getElementById('log');
        const outputContainer = document.getElementById('output-container');
        const outputImage = document.getElementById('output-image');
        const downloadBtn = document.getElementById('download-btn');
        const sizeSaved = document.getElementById('size-saved');

        let selectedFile = null;

        qualityInput.addEventListener('input', (e) => {
            qualityVal.textContent = e.target.value + '%';
        });

        ffmpeg.setLogger(({ type, message }) => {
            const line = document.createElement('p');
            line.className = "hover:bg-[#111] py-0.5 px-1";
            line.textContent = `> [${type.toUpperCase()}] ${message}`;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
        });

        async function initFFmpeg() {
            try {
                await ffmpeg.load();
                statusDiv.className = "p-3 bg-[#0e1713] border border-emerald-900/50 text-emerald-400 font-mono text-xs flex items-center gap-2";
                statusDiv.innerHTML = "<span>✓</span> App tools loaded successfully. Ready to convert.";
                fileInput.disabled = false;
            } catch (err) {
                console.error(err);
                statusDiv.className = "p-3 bg-[#1c1010] border border-red-900/50 text-red-400 font-mono text-xs flex items-center gap-2";
                statusDiv.innerHTML = "<span>🗙</span> Error starting the app. Make sure you are using a secure website URL.";
            }
        }

        initFFmpeg();

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => e.preventDefault(), false);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => {
                dropzone.classList.add('border-gray-500', 'bg-[#141414]');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => {
                dropzone.classList.remove('border-gray-500', 'bg-[#141414]');
            }, false);
        });

        dropzone.addEventListener('drop', (e) => {
            if (fileInput.disabled) return;
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) {
                handleFileSelection(files[0]);
            }
        });

        dropzone.addEventListener('click', () => {
            if (!fileInput.disabled) fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelection(e.target.files[0]);
            }
        });

        function handleFileSelection(file) {
            if (file.type === "image/gif" || file.type === "video/mp4") {
                selectedFile = file;
                fileInfo.textContent = `SELECTED FILE: ${selectedFile.name.toUpperCase()} // SIZE: ${(selectedFile.size / (1024 * 1024)).toFixed(2)} MB`;
                fileInfo.classList.remove('hidden');
                convertBtn.disabled = false;
            } else {
                alert("File error: Please choose an MP4 video or a GIF image.");
            }
        }

        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            convertBtn.disabled = true;
            convertBtn.textContent = "CONVERTING FILE NOW...";
            logContainer.classList.remove('hidden');
            outputContainer.classList.add('hidden');
            logDiv.innerHTML = "<p class='text-gray-600'>> Opening file... OK</p>";

            const inputName = `input_${Date.now()}_${selectedFile.name}`;
            const outputName = 'output.webp';

            try {
                ffmpeg.FS('writeFile', inputName, await fetchFile(selectedFile));

                const quality = qualityInput.value;
                const maxWidth = maxWidthSelect.value;

                let filterGraph = "";
                if (maxWidth !== 'original') {
                    filterGraph = `scale=w='min(${maxWidth},iw)':h=-1:force_original_aspect_ratio=decrease`;
                }

                const ffmpegArgs = [
                    '-i', inputName,
                    ...(filterGraph ? ['-vf', filterGraph] : []),
                    '-vcodec', 'libwebp',
                    '-lossless', '0',
                    '-q:v', quality,
                    '-loop', '0',
                    '-an',
                    '-preset', 'picture',
                    outputName
                ];

                logDiv.innerHTML += `<p class='text-emerald-500'>> Starting conversion steps... </p>`;

                await ffmpeg.run(...ffmpegArgs);

                const data = ffmpeg.FS('readFile', outputName);
                const webpBlob = new Blob([data.buffer], { type: 'image/webp' });
                const url = URL.createObjectURL(webpBlob);

                outputImage.src = url;
                downloadBtn.href = url;
                downloadBtn.download = selectedFile.name.replace(/\.[^/.]+$/, "") + "_optimized.webp";

                const origSizeMB = selectedFile.size / (1024 * 1024);
                const newSizeMB = webpBlob.size / (1024 * 1024);
                const compressionPct = (((selectedFile.size - webpBlob.size) / selectedFile.size) * 100).toFixed(0);

                sizeSaved.textContent = `STATS: [${origSizeMB.toFixed(2)}MB] -> [${newSizeMB.toFixed(2)}MB] (Shrunk by -${compressionPct}%)`;
                outputContainer.classList.remove('hidden');
            } catch (error) {
                alert("Conversion failed. Please try a different file.");
                console.error(error);
            } finally {
                try { ffmpeg.FS('unlink', inputName); ffmpeg.FS('unlink', outputName); } catch (e) { }
                convertBtn.disabled = false;
                convertBtn.textContent = "Convert to WebP";
            }
        });
    </script>
</body>

</html>
